name: Build FocusLock

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller psutil sqlalchemy

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name FocusLock --paths src src/focuslock_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusLock-v3-Windows
          path: dist/FocusLock.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FocusLock.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
